name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v6

      - name: Version consistency check
        run: |
          PROP_VER=$(grep '^version=' module.prop | cut -d'=' -f2)
          if [ "$TAG" != "$PROP_VER" ]; then
            echo "ERROR: Tag ($TAG) does not match module.prop version ($PROP_VER)"
            exit 1
          fi
          if ! grep -q "^## ${TAG}$" CHANGELOG.md; then
            echo "ERROR: CHANGELOG.md missing section for ${TAG}"
            exit 1
          fi
          echo "Version consistent: $TAG"

      - name: ShellCheck
        run: |
          if ls *.sh 1>/dev/null 2>&1; then
            shellcheck -s sh *.sh
          fi

      - name: Check update-binary freshness
        run: |
          make update
          if ! git diff --quiet META-INF/com/google/android/update-binary; then
            echo "ERROR: update-binary is outdated — run 'make update' and commit"
            exit 1
          fi


      - name: Build zip
        run: make zip

      - name: Verify zip contents
        run: |
          LISTING=$(unzip -l *.zip)
          echo "$LISTING"
          echo "$LISTING" | grep -qE '\.git/|Makefile|README\.md' \
            && { echo "::error::Dev files found in zip"; exit 1; } || true

      - name: Extract release notes from CHANGELOG.md
        run: |
          awk -v tag="## ${TAG}" '
            $0 == tag { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > /tmp/release-notes.txt

      - name: Generate update.json
        run: |
          VERSION=$(grep '^version=' module.prop | cut -d'=' -f2)
          VERSION_CODE=$(grep '^versionCode=' module.prop | cut -d'=' -f2)
          ID=$(grep '^id=' module.prop | cut -d'=' -f2)
          REPO="${GITHUB_REPOSITORY}"
          cat > update.json <<EOF
{
  "versionCode": ${VERSION_CODE},
  "version": "${VERSION}",
  "zipUrl": "https://github.com/${REPO}/releases/download/${TAG}/${ID}-${VERSION}.zip",
  "changelog": "https://github.com/${REPO}/releases/tag/${TAG}"
}
EOF

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ID=$(grep '^id=' module.prop | cut -d'=' -f2)
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/release-notes.txt \
            ${ID}-v*.zip \
            update.json
