name: ShellCheck

on: [push, pull_request]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run ShellCheck
        run: |
          if ls *.sh 1>/dev/null 2>&1; then
            shellcheck -s sh *.sh
          else
            echo "No shell scripts found, skipping"
          fi
