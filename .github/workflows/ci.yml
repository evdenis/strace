name: CI

on:
  push:
    branches: [master]
    tags-ignore: ['v*']
  pull_request:
  workflow_call:

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: |
          STATUS=0
          for f in *.sh; do
            [ -f "$f" ] || continue
            shellcheck "$f" || STATUS=1
          done
          for f in scripts/*.sh; do
            [ -f "$f" ] || continue
            shellcheck "$f" || STATUS=1
          done
          for f in tests/*.sh; do
            [ -f "$f" ] || continue
            shellcheck "$f" || STATUS=1
          done
          exit $STATUS

  zip:
    name: Build & verify zip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build zip
        run: make zip

      - name: Verify expected files are present
        run: |
          ZIP=$(ls strace-v*.zip)
          for f in module.prop customize.sh \
                   strace-bin/arm64/strace \
                   strace-bin/arm/strace \
                   strace-bin/x86_64/strace \
                   strace-bin/x86/strace \
                   META-INF/com/google/android/update-binary \
                   META-INF/com/google/android/updater-script; do
            unzip -l "$ZIP" | grep -q "$f" || { echo "MISSING: $f"; exit 1; }
          done
          echo "All expected files present"

      - name: Verify excluded files are absent
        run: |
          ZIP=$(ls strace-v*.zip)
          for f in .gitignore .dockerignore CLAUDE.md .claude/ .git/ .github/ \
                   Makefile Dockerfile LICENSE README.md \
                   CHANGELOG.md CHECKLIST.md cliff.toml hooks/ scripts/ tests/ out/; do
            if unzip -l "$ZIP" | grep -q "$f"; then
              echo "UNEXPECTED: $f found in zip"
              exit 1
            fi
          done
          echo "No excluded files in zip"
